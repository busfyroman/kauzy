name: Weekly Data Scrape

on:
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:
    inputs:
      step:
        description: 'Run specific step (all/politicians/wikidata/companies/kauzy/procurement/link/score/track)'
        required: false
        default: 'all'

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scraper/requirements.txt

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Run scraper pipeline
        working-directory: scraper
        run: |
          STEP="${{ github.event.inputs.step || 'all' }}"
          python main.py --step "$STEP" --retries 3 --timeout 30 --verbose

      - name: Copy output to frontend
        run: |
          mkdir -p frontend/public/data
          cp -r scraper/output/* frontend/public/data/

      - name: Check for changes
        id: changes
        run: |
          git add -A frontend/public/data/
          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          DATE=$(date +%Y-%m-%d)
          git commit -m "chore(data): update scraped data [$DATE]"
          git push
